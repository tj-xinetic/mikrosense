<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikrobotik IR Health Check - by TJ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e0e0e0; 
            padding: 30px 20px;
            min-height: 100vh;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            letter-spacing: 1px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .controls-section {
            max-width: 1200px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 25px;
        }
        .control-group {
            margin-bottom: 20px;
        }
        .control-group label {
            display: block;
            margin-bottom: 8px;
            color: #00d4ff;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
        }
        .control-group input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
        }
        .threshold-value {
            color: #34d399;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .status-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .status-card {
            background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .status-card h3 {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .status-value {
            font-size: 2rem;
            font-weight: 900;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        .line-detected {
            color: #34d399;
            background: rgba(52, 211, 153, 0.1);
            border: 2px solid #34d399 !important;
        }
        .line-detected .status-value {
            color: #34d399;
            text-shadow: 0 0 10px rgba(52, 211, 153, 0.5);
        }
        .line-lost {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            border: 2px solid #f87171 !important;
        }
        .line-lost .status-value {
            color: #f87171;
            text-shadow: 0 0 10px rgba(248, 113, 113, 0.5);
            animation: blink 1s infinite;
        }
        button { 
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white; 
            border: none; 
            padding: 14px 32px; 
            border-radius: 8px; 
            font-size: 1rem; 
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            margin-bottom: 30px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
        }
        button:active {
            transform: translateY(0);
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto;
        }
        .sensor-card { 
            background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%);
            border: 2px solid #333;
            border-radius: 12px; 
            padding: 20px; 
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .sensor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00d4ff, #0099cc);
        }
        .sensor-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.2);
        }
        .sensor-id {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .val { 
            font-size: 2.5rem; 
            font-weight: 900; 
            margin: 12px 0; 
            color: #00d4ff;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        .detecting {
            color: #34d399;
        }
        .status { 
            font-weight: bold; 
            padding: 8px 12px; 
            border-radius: 6px; 
            display: inline-block; 
            margin-top: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .good { 
            background: linear-gradient(135deg, #064e3b 0%, #047857 100%);
            color: #34d399; 
            border: 1px solid #34d399;
        }
        .bad { 
            background: linear-gradient(135deg, #7f1d1d 0%, #991b1b 100%);
            color: #fca5a5; 
            border: 1px solid #f87171;
            animation: blink 1s infinite;
        }
        .signal-strength-bar {
            margin-top: 10px;
        }
        .signal-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .bar-container {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f87171, #fbbf24, #34d399);
            border-radius: 4px;
            transition: width 0.2s ease;
        }
        .minmax { 
            font-size: 0.8rem; 
            color: #999; 
            border-top: 1px solid #444; 
            padding-top: 10px; 
            margin-top: 12px;
            line-height: 1.6;
        }
        .minmax-label {
            color: #666;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .minmax-value {
            color: #aaa;
            font-weight: 600;
        }
        @keyframes blink { 
            0% { opacity: 1; } 
            50% { opacity: 0.7; } 
            100% { opacity: 1; } 
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>🛰️ Mikrobotik IR Health Check - by TJ</h1>
    <p class="subtitle">Real-time IR Line Sensor Diagnostics</p>
    
    <div class="container">
        <button id="connectBtn">📡 Connect via OTG</button>

        <!-- Status Panel -->
        <div class="status-panel">
            <div class="status-card" id="lineStatusCard">
                <h3>Line Detection Status</h3>
                <div class="status-value" id="lineStatus">Inactive</div>
            </div>
            <div class="status-card">
                <h3>Line Position</h3>
                <div class="status-value" id="linePosition">--</div>
            </div>
            <div class="status-card">
                <h3>Sensors Detecting</h3>
                <div class="status-value" id="sensorsDetecting">0</div>
            </div>
        </div>

        <!-- Controls Section -->
        <div class="controls-section">
            <div class="control-group">
                <label for="threshold">Detection Threshold (Sensitivity)</label>
                <input type="range" id="threshold" min="0" max="255" value="128">
                <div style="margin-top: 8px; color: #999;">
                    Value: <span class="threshold-value" id="thresholdValue">128</span> / 255
                </div>
            </div>
        </div>

        <!-- Sensor Grid -->
        <div id="sensorGrid" class="grid"></div>
    </div>

    <script>
        let port, reader, sensorData = {};
        let detectionThreshold = 128;
        const DEV_LIMIT = 150;

        document.getElementById('connectBtn').onclick = async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                document.getElementById('connectBtn').innerText = "✅ Connected";
                document.getElementById('connectBtn').disabled = true;
                readData();
            } catch (err) {
                console.error('Connection error:', err);
            }
        };

        document.getElementById('threshold').oninput = (e) => {
            detectionThreshold = parseInt(e.target.value);
            document.getElementById('thresholdValue').innerText = detectionThreshold;
        };

        async function readData() {
            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            const inputStream = decoder.readable;
            reader = inputStream.getReader();
            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += value;
                if (buffer.includes('\n')) {
                    const lines = buffer.split('\n');
                    parseLine(lines[0]);
                    buffer = lines[1] || "";
                }
            }
        }

        function parseLine(line) {
            const parts = line.trim().split(',');
            let currentBatch = [];
            
            parts.forEach(p => {
                const [id, val] = p.split(':');
                const n = parseInt(val);
                if (isNaN(n)) return;

                if (!sensorData[id]) sensorData[id] = { min: n, max: n };
                sensorData[id].curr = n;
                sensorData[id].min = Math.min(sensorData[id].min, n);
                sensorData[id].max = Math.max(sensorData[id].max, n);
                currentBatch.push(n);
            });

            const avg = currentBatch.reduce((a, b) => a + b, 0) / currentBatch.length;
            updateUI(avg);
        }

        function calculateLinePosition(sensorReadings) {
            const sensorIds = Object.keys(sensorReadings).sort();
            const detectedSensors = sensorIds.filter(id => sensorReadings[id] > detectionThreshold);
            
            if (detectedSensors.length === 0) return "Not Detected";
            
            const sensorCount = sensorIds.length;
            const midPoint = sensorCount / 2;
            let weightedSum = 0;
            let totalWeight = 0;
            
            detectedSensors.forEach(id => {
                const index = sensorIds.indexOf(id);
                const value = sensorReadings[id];
                weightedSum += index * value;
                totalWeight += value;
            });
            
            const position = weightedSum / totalWeight;
            
            if (position < midPoint * 0.3) return "LEFT";
            if (position > midPoint * 1.7) return "RIGHT";
            return "CENTER";
        }

        function updateUI(avg) {
            const grid = document.getElementById('sensorGrid');
            grid.innerHTML = "";
            
            const sensorIds = Object.keys(sensorData).sort();
            let detectedCount = 0;
            const currentReadings = {};
            
            sensorIds.forEach(id => {
                const s = sensorData[id];
                const deviation = Math.abs(s.curr - avg);
                const range = s.max - s.min;
                const isBad = deviation > DEV_LIMIT || (range < 10 && s.max > 0);
                
                // Check if sensor is detecting line
                const isDetecting = s.curr > detectionThreshold;
                if (isDetecting) detectedCount++;
                currentReadings[id] = s.curr;
                
                // Calculate signal strength (0-100%)
                const signalStrength = Math.min(100, (s.curr / 255) * 100);
                
                const card = document.createElement('div');
                card.className = 'sensor-card';
                card.innerHTML = `
                    <div class="sensor-id">Sensor ${id}</div>
                    <div class="val ${isDetecting ? 'detecting' : ''}" style="color:${isBad ? '#fca5a5' : (isDetecting ? '#34d399' : '#00d4ff')}">${s.curr}</div>
                    <div class="status ${isBad ? 'bad' : 'good'}">${isBad ? '⚠️ BAD' : (isDetecting ? '✓ DETECTING' : '✓ READY')}</div>
                    <div class="signal-strength-bar">
                        <div class="signal-label">Signal Strength</div>
                        <div class="bar-container">
                            <div class="bar-fill" style="width: ${signalStrength}%"></div>
                        </div>
                    </div>
                    <div class="minmax">
                        <div><span class="minmax-label">MIN:</span> <span class="minmax-value">${s.min}</span></div>
                        <div><span class="minmax-label">MAX:</span> <span class="minmax-value">${s.max}</span></div>
                        <div><span class="minmax-label">RANGE:</span> <span class="minmax-value">${range}</span></div>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            // Update status cards
            const lineDetected = detectedCount > 0;
            const statusCard = document.getElementById('lineStatusCard');
            const statusElement = document.getElementById('lineStatus');
            
            if (lineDetected) {
                statusCard.classList.remove('line-lost');
                statusCard.classList.add('line-detected');
                statusElement.innerText = "✓ DETECTED";
            } else {
                statusCard.classList.remove('line-detected');
                statusCard.classList.add('line-lost');
                statusElement.innerText = "⚠️ LOST";
            }
            
            document.getElementById('linePosition').innerText = calculateLinePosition(currentReadings);
            document.getElementById('sensorsDetecting').innerText = detectedCount;
        }
    </script>
</body>
</html>
