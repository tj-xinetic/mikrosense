<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 20px 0;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin: 20px;
            padding: 20px;
        }
        h1 {
            color: #35424a;
        }
        .button {
            display: inline-block;
            box-sizing: border-box;
            width: 200px;
            height: 40px;
            background: #35424a;
            color: white;
            text-align: center;
            line-height: 40px;
            border-radius: 5px;
            text-decoration: none;
            transition: background 0.3s ease;
        }
        .button:hover {
            background: #1a1c20;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Mikrosense</h1>
    </header>
    <div class="container">
        <div class="card">
            <h2>Card Title</h2>
            <p>This is an example card. It can contain any content you'd like!</p>
            <a href="#" class="button">Click Me</a>
        </div>
    </div>
</body>
</html>
