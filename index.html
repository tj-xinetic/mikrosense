<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mikrobotik Mission Control</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: #0a0a0a; color: white; 
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; /* Prevents scrolling */
        }
        
        /* Header & Connect Area */
        header { padding: 10px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; }
        button { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button.connected { background: #059669; }

        /* Main Status Bar */
        .status-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: #111; }
        .status-item { background: #222; padding: 10px; border-radius: 8px; text-align: center; }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-val { font-size: 1.2rem; font-weight: bold; }
        .warning { color: #f87171; }
        .safe { color: #34d399; }

        /* Line Visualization */
        .line-view { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #050505; position: relative; }
        .track { width: 90%; height: 20px; background: #333; border-radius: 10px; position: relative; }
        .indicator { 
            width: 30px; height: 30px; background: #00d4ff; border-radius: 50%; 
            position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
            transition: left 0.1s ease-out; box-shadow: 0 0 15px #00d4ff;
        }

        /* Sensor Grid - Fills remaining space */
        .sensor-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; padding-bottom: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 8px; text-align: center; }
        .card.error { border-color: #ef4444; background: #2d1a1a; }
        .card-title { font-size: 0.6rem; color: #aaa; margin-bottom: 5px; }
        .card-val { font-size: 1.1rem; font-weight: 800; color: #00d4ff; }
        .card-minmax { font-size: 0.55rem; color: #666; margin-top: 5px; }
        .eval { font-size: 0.6rem; font-weight: bold; margin-top: 4px; padding: 2px; border-radius: 3px; }
        .eval-good { color: #34d399; }
        .eval-bad { color: #ef4444; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: 800; color: #00d4ff;">MIKROBOTIK v1.0</div>
        <button id="connectBtn">🔌 CONNECT</button>
    </header>

    <div class="status-bar">
        <div class="status-item">
            <div class="label">Line Detection</div>
            <div id="detStatus" class="stat-val warning">LOST</div>
        </div>
        <div class="status-item">
            <div class="label">Line Position</div>
            <div id="posStatus" class="stat-val">--</div>
        </div>
    </div>

    <div class="line-view">
        <div class="track">
            <div id="lineIndicator" class="indicator" style="display: none;"></div>
        </div>
    </div>

    <div id="sensorGrid" class="sensor-grid">
        </div>

    <script>
        let port, reader, sensorData = {};
        const THRESHOLD = 500; // Value > 500 = Black line
        const DEV_MAX = 300;   // Max deviation allowed before flagging "Red"

        document.getElementById('connectBtn').onclick = async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 }); // Matches your Arduino Code
                document.getElementById('connectBtn').innerText = "✅ CONNECTED";
                document.getElementById('connectBtn').classList.add('connected');
                readLoop();
            } catch (e) { alert("Serial Connection Failed. Use Chrome!"); }
        };

        async function readLoop() {
            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            const inputStream = decoder.readable;
            reader = inputStream.getReader();
            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += value;
                if (buffer.includes('\n')) {
                    const lines = buffer.split('\n');
                    processData(lines[0]);
                    buffer = lines[1] || "";
                }
            }
        }

        function processData(line) {
            const parts = line.trim().split(',');
            if (parts.length < 5) return;

            let currentBatch = [];
            let activeSensors = 0;
            let weightedSum = 0;

            parts.forEach((p, index) => {
                const [id, val] = p.split(':');
                const n = parseInt(val);
                if (isNaN(n)) return;

                if (!sensorData[id]) sensorData[id] = { min: n, max: n };
                sensorData[id].curr = n;
                sensorData[id].min = Math.min(sensorData[id].min, n);
                sensorData[id].max = Math.max(sensorData[id].max, n);
                currentBatch.push(n);

                // Line Tracking Logic
                if (n > THRESHOLD) {
                    activeSensors++;
                    weightedSum += (index + 1); 
                }
            });

            // Calculate Position
            const avg = currentBatch.reduce((a, b) => a + b, 0) / currentBatch.length;
            updateUI(avg, activeSensors, weightedSum);
        }

        function updateUI(avg, activeCount, weightedSum) {
            const detS = document.getElementById('detStatus');
            const posS = document.getElementById('posStatus');
            const ind = document.getElementById('lineIndicator');

            // 1. Line Status & Position
            if (activeCount > 0) {
                const pos = weightedSum / activeCount;
                detS.innerText = "DETECTED";
                detS.className = "stat-val safe";
                
                let posText = "Center";
                if (pos < 2.5) posText = "Left";
                if (pos > 3.5) posText = "Right";
                posS.innerText = posText;

                // Move visual indicator (1 to 5 mapping to 0% to 100%)
                ind.style.display = "block";
                ind.style.left = ((pos - 1) * 25) + "%";
            } else {
                detS.innerText = "LOST";
                detS.className = "stat-val warning";
                posS.innerText = "Searching...";
                ind.style.display = "none";
            }

            // 2. Sensor Cards
            const grid = document.getElementById('sensorGrid');
            grid.innerHTML = "";
            Object.keys(sensorData).sort().forEach(id => {
                const s = sensorData[id];
                const deviation = Math.abs(s.curr - avg);
                const isBad = deviation > DEV_MAX;

                const card = document.createElement('div');
                card.className = `card ${isBad ? 'error' : ''}`;
                card.innerHTML = `
                    <div class="card-title">SENSOR ${id.toUpperCase()}</div>
                    <div class="card-val">${s.curr}</div>
                    <div class="eval ${isBad ? 'eval-bad' : 'eval-good'}">${isBad ? 'FAULT' : 'GOOD'}</div>
                    <div class="card-minmax">L:${s.min} H:${s.max}</div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
