<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mikrobotik Pro Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        header { background: #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; }
        .logo { font-size: 1.5rem; font-weight: 900; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; }
        button { background: #0ea5e9; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.connected { background: #10b981; }

        /* Main Content Grid */
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 15px; flex-grow: 1; overflow-y: auto; }
        @media (min-width: 768px) { .dashboard { grid-template-columns: 1fr 1fr; } }
        
        .panel { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        .panel h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 15px; text-transform: uppercase; }

        /* Visualizer */
        .sensor-array { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 2px dashed #334155; margin-bottom: 15px; }
        .sensor-dot { width: 40px; height: 40px; border-radius: 50%; background: #fff; border: 4px solid #cbd5e1; transition: 0.1s; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }
        .sensor-dot.active { background: #1e1e1e; border-color: #ef4444; color: #ef4444; box-shadow: 0 0 15px #ef4444; }

        /* Status Texts */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #0f172a; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 0.8rem; color: #94a3b8; }
        .stat-value { font-size: 1.4rem; font-weight: 900; margin-top: 5px; color: #38bdf8; }
        .text-red { color: #ef4444 !important; }
        .text-green { color: #10b981 !important; }
        .text-yellow { color: #eab308 !important; }

        /* Threshold Slider */
        .controls { display: flex; flex-direction: column; gap: 10px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        /* Raw Data Grid */
        .raw-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; text-align: center; }
        .raw-card { background: #0f172a; padding: 10px 5px; border-radius: 6px; }
        .raw-val { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Mikrobotik Line Sensor Detection By Tj</div>
        <button id="connectBtn">🔌 Connect USB</button>
    </header>

    <div class="dashboard">
        <div class="panel">
            <h2>Line Visualization</h2>
            <div class="sensor-array" id="sensorDots">
                <div class="sensor-dot" id="dot1">1</div>
                <div class="sensor-dot" id="dot2">2</div>
                <div class="sensor-dot" id="dot3">3</div>
                <div class="sensor-dot" id="dot4">4</div>
                <div class="sensor-dot" id="dot5">5</div>
            </div>
            
            <div class="status-grid">
                <div class="stat-box">
                    <div class="stat-label">Line Position</div>
                    <div class="stat-value" id="posText">WAITING</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Junction Detection</div>
                    <div class="stat-value" id="juncText">--</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>Calibration & Data</h2>
            <div class="controls">
                <label style="color:#94a3b8; font-size:0.9rem;">
                    Black Line Threshold: <span id="threshDisp" style="color:white; font-weight:bold;">500</span>
                </label>
                <input type="range" id="thresholdSlider" min="0" max="1023" value="500">
                <p style="font-size:0.75rem; color:#64748b; margin-bottom:15px;">
                    *Values ABOVE threshold are considered BLACK. Adjust if robot behaves erratically.
                </p>
            </div>

            <div class="raw-grid" id="rawGrid">
                </div>
        </div>
    </div>

    <script>
        let port, reader;
        let threshold = 500;
        const slider = document.getElementById('thresholdSlider');
        const threshDisp = document.getElementById('threshDisp');

        // Update threshold when slider moves
        slider.addEventListener('input', (e) => {
            threshold = parseInt(e.target.value);
            threshDisp.innerText = threshold;
        });

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                const btn = document.getElementById('connectBtn');
                btn.innerText = "✅ CONNECTED";
                btn.classList.add('connected');
                readData();
            } catch (err) {
                alert("Failed to connect. Make sure no other program (like Arduino IDE) is using the port!");
            }
        });

        async function readData() {
            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            reader = decoder.readable.getReader();
            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += value;
                
                // ROBUST BUFFER PARSING: Prevents crashing or dropped data
                let lines = buffer.split('\n');
                buffer = lines.pop(); // Keep the last incomplete piece in the buffer

                for (let line of lines) {
                    if (line.trim().length > 0) {
                        processLine(line.trim());
                    }
                }
            }
        }

        function processLine(line) {
            // Expected format: s1:100,s2:500,s3:800,s4:100,s5:100
            const parts = line.split(',');
            if (parts.length < 5) return; 

            let values = [];
            let activeSensors = []; // Stores index of sensors seeing the line
            
            // Parse raw data
            const rawHtml = parts.map((p, index) => {
                const [id, valStr] = p.split(':');
                const val = parseInt(valStr);
                if(isNaN(val)) return '';
                values.push(val);
                
                // Is this sensor seeing the line?
                const isLine = val > threshold;
                if(isLine) activeSensors.push(index + 1);

                // Update Visual Dot
                const dot = document.getElementById(`dot${index + 1}`);
                if (isLine) dot.classList.add('active');
                else dot.classList.remove('active');

                // Generate Raw HTML block
                return `
                    <div class="raw-card">
                        <div style="font-size:0.7rem; color:#94a3b8;">S${index+1}</div>
                        <div class="raw-val" style="color: ${isLine ? '#ef4444' : '#10b981'}">${val}</div>
                    </div>`;
            }).join('');
            
            document.getElementById('rawGrid').innerHTML = rawHtml;
            evaluateState(activeSensors);
        }

        function evaluateState(active) {
            const posEl = document.getElementById('posText');
            const juncEl = document.getElementById('juncText');
            const count = active.length;

            // 1. JUNCTION DETECTION
            if (count >= 4) {
                juncEl.innerText = "CROSS ➕";
                juncEl.className = "stat-value text-red";
            } else if (count >= 3 && active.includes(1) && active.includes(2) && !active.includes(5)) {
                juncEl.innerText = "LEFT T ┣";
                juncEl.className = "stat-value text-yellow";
            } else if (count >= 3 && active.includes(5) && active.includes(4) && !active.includes(1)) {
                juncEl.innerText = "RIGHT T ┫";
                juncEl.className = "stat-value text-yellow";
            } else {
                juncEl.innerText = "NONE";
                juncEl.className = "stat-value";
            }

            // 2. POSITION DETECTION (Weighted Average)
            if (count === 0) {
                posEl.innerText = "LOST";
                posEl.className = "stat-value text-red";
                return;
            }

            let sum = active.reduce((a, b) => a + b, 0);
            let avg = sum / count;

            posEl.className = "stat-value text-green";
            if (avg === 3) posEl.innerText = "CENTER";
            else if (avg < 2) posEl.innerText = "FAR LEFT";
            else if (avg < 3) posEl.innerText = "SLIGHT LEFT";
            else if (avg > 4) posEl.innerText = "FAR RIGHT";
            else if (avg > 3) posEl.innerText = "SLIGHT RIGHT";
        }
    </script>
</body>
</html>
